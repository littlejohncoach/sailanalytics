<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>SailAnalytics – Course View</title>

    <!-- MapLibre CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css"
    />

    <!-- MapLibre JS (MUST load before viewer_base.js) -->
    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>

<body>
    <!-- MAP CONTAINER -->
    <div id="map"></div>

    <!-- BASE VIEWER (creates map + rotator) -->
    <script src="viewer_base.js"></script>

    <!-- TRACKS LAYER -->
    <script src="viewer_tracks.js"></script>

    <!-- GEOMETRY CAMERA -->
    <script src="viewergeometry.js"></script>
</body>
</html>
