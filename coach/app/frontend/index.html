<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SailAnalytics Coach Dashboard</title>

  <link rel="stylesheet" href="/static/styles.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
</head>

<body>
  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <h2>Controls</h2>

      <label>Race</label>
      <select id="raceSelect">
        <option value="">—</option>
      </select>

      <label>Sailors</label>
      <select id="sailorSelect" multiple size="6"></select>

      <label>Leg</label>
      <select id="legSelect">
        <option value="">—</option>
      </select>

      <button id="refreshBtn">Refresh</button>

      <div class="small" id="status"></div>
    </aside>

    <!-- MAIN -->
    <main id="main">

      <header id="header">
        <h1>Coach Dashboard</h1>
        <div id="meta"></div>
      </header>

      <!-- MAP -->
      <section id="viewerSection">
        <div id="map"></div>
      </section>

      <!-- ANALYTICS -->
      <section id="tableSection">
        <h3 id="analyticsTitle">Analytics</h3>

        <div id="tableWrap">
          <table id="dataTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- PLAYER CONTROLS -->
      <div id="playerControls" class="player-controls" style="display:none;">

        <div class="player-row">
          <button id="btnPlay">▶︎</button>
          <button id="btnStepBack">⟵</button>
          <button id="btnStepFwd">⟶</button>
          <button id="btnFullscreen">⛶</button>
        </div>

        <div class="player-meta">
          <div>Start: <span id="lblStart">--:--</span></div>
          <div>Finish: <span id="lblFinish">--:--</span></div>
          <div>Now: <span id="lblNow">T+00:00</span></div>
        </div>

        <div class="player-row">
          <input id="timeSlider" type="range" min="0" max="0" value="0" step="1" />
          <input id="timeIndexBox" type="number" min="0" max="0" value="0" step="1" />
        </div>

      </div>

      <!-- BOTTOM BUFFER -->
      <div id="bottomSpacer"></div>

    </main>
  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Main -->
  <script type="module" src="/static/main.js"></script>

</body>
</html>
